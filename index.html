<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەیجەکانی یوسف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #e73c7e, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .profile-flag {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .stripe { flex: 1; width: 100%; }
        .red { background: #ED2024; }
        .white { background: #FFFFFF; display: flex; justify-content: center; align-items: center; }
        .green { background: #278540; }
        
        .sun-emoji { 
            font-size: 38px; 
            line-height: 0;
            margin-top: -2px;
        }

        h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .link-card {
            background: white;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .link-card i {
            font-size: 20px;
            width: 30px;
        }

        .link-card span {
            flex-grow: 1;
            text-align: center;
        }

        .fa-snapchat { color: #FFFC00; text-shadow: 1px 1px 1px #000; }
        .fa-tiktok { color: #000; }
        .fa-instagram { color: #E1306C; }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-flag">
            <div class="stripe red"></div>
            <div class="stripe white">
                <span class="sun-emoji">☀️</span>
            </div>
            <div class="stripe green"></div>
        </div>

        <!-- لێرە ناوەکە گۆڕدراوە -->
        <h2>ux-yusa0@</h2>

        <a href="https://snapchat.com/t/2vv21LTj" class="link-card">
            <i class="fab fa-snapchat"></i>
            <span>Snapchat</span>
            <i class="fas fa-chevron-left" style="font-size: 12px; color: #ccc;"></i>
        </a>

        <a href="https://www.tiktok.com/@yusf_kirkuki" class="link-card">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
            <i class="fas fa-chevron-left" style="font-size: 12px; color: #ccc;"></i>
        </a>

        <a href="https://www.instagram.com/uxyusa0" class="link-card">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
            <i class="fas fa-chevron-left" style="font-size: 12px; color: #ccc;"></i>
        </a>
    </div>

</body>
</html>
