<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ux-yusa0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* باکگراوندێکی زیندووتر */
            background: linear-gradient(-45deg, #4158D0, #C850C0, #FFCC70, #00DBDE);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 380px;
            /* ستایڵی شووشەیی */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .profile-flag {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 5px solid white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.5s;
        }

        .profile-flag:hover { transform: rotate(10deg) scale(1.05); }

        .stripe { flex: 1; width: 100%; }
        .red { background: #ED2024; }
        .white { background: #FFFFFF; display: flex; justify-content: center; align-items: center; }
        .green { background: #278540; }
        
        /* خۆرێکی گەورە و درەوشاوە */
        .kurdish-sun {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 5px #FFD100);
        }

        h2 {
            color: white;
            font-size: 26px;
            margin-bottom: 35px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .link-card {
            background: white;
            margin-bottom: 18px;
            padding: 16px 25px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background: #f8f8f8;
        }

        .link-card i { font-size: 22px; width: 35px; }
        .link-text { flex-grow: 1; text-align: center; font-size: 19px; }

        .fa-snapchat { color: #FFFC00; filter: drop-shadow(0 0 2px rgba(0,0,0,0.3)); }
        .fa-tiktok { color: #010101; }
        .fa-instagram { color: #E1306C; }
        .fa-chevron-left { font-size: 14px; color: #bbb; }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-flag">
            <div class="stripe red"></div>
            <div class="stripe white">
                <svg class="kurdish-sun" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="18" fill="#FFD100"/>
                    <g fill="#FFD100">
                        <polygon points="50,5 53,30 47,30" transform="rotate(0 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(17.14 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(34.28 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(51.42 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(68.56 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(85.7 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(102.84 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(119.98 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(137.12 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(154.26 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(171.4 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(188.54 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(205.68 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(222.82 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(239.96 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(257.1 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(274.24 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(291.38 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(308.52 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(325.66 50 50)"/>
                        <polygon points="50,5 53,30 47,30" transform="rotate(342.8 50 50)"/>
                    </g>
                </svg>
            </div>
            <div class="stripe green"></div>
        </div>

        <h2>ux-yusa0@</h2>

        <a href="https://snapchat.com/t/2vv21LTj" class="link-card">
            <i class="fab fa-snapchat"></i>
            <span class="link-text">Snapchat</span>
            <i class="fas fa-chevron-left"></i>
        </a>

        <a href="https://www.tiktok.com/@yusf_kirkuki" class="link-card">
            <i class="fab fa-tiktok"></i>
            <span class="link-text">TikTok</span>
            <i class="fas fa-chevron-left"></i>
        </a>

        <a href="https://www.instagram.com/uxyusa0" class="link-card">
            <i class="fab fa-instagram"></i>
            <span class="link-text">Instagram</span>
            <i class="fas fa-chevron-left"></i>
        </a>
    </div>

</body>
</html>
