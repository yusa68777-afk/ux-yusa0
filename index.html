<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەیجەکانی یوسف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: sans-serif;
            position: relative;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ئاڵا بچووکەکەی گۆشەی سەرەوە */
        .top-flag {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 30px;
            background: linear-gradient(to bottom, #ED2024 33.3%, #ffffff 33.3%, #ffffff 66.6%, #278540 66.6%);
            border-radius: 4px;
            border: 1px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            z-index: 1000;
        }

        /* ئاڵای ناوەڕاست بە کوالێتی بەرز */
        .flag-box {
            width: 140px;
            height: 90px;
            margin: 0 auto 20px auto;
            border-radius: 12px;
            border: 3px solid white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .stripe { flex: 1; display: flex; justify-content: center; align-items: center; }
        .red { background: #ED2024; }
        .white { background: #FFFFFF; }
        .green { background: #278540; }
        .sun-icon { color: #FFD100; font-size: 28px; font-weight: bold; line-height: 0; }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2 { color: white; margin-bottom: 25px; font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        .social-link {
            display: block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:active {
            background: white;
            color: #333;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="top-flag">☀️</div>

    <div class="card">
        <div class="flag-box">
            <div class="stripe red"></div>
            <div class="stripe white"><span class="sun-icon">☀️</span></div>
            <div class="stripe green"></div>
        </div>

        <h2>پەیجەکانم</h2>

        <a href="https://snapchat.com/t/2vv21LTj" class="social-link">Snapchat</a>
        <a href="https://www.tiktok.com/@yusf_kirkuki" class="social-link">TikTok</a>
        <a href="https://www.instagram.com/uxyusa0" class="social-link">Instagram</a>
    </div>

</body>
</html>
