<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەیجەکانی یوسف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: sans-serif;
            position: relative;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ئاڵای کوردستان لە گۆشەی سەرەوە */
        .kurdish-flag-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .red { background: #ED2024; flex: 1; }
        .white { 
            background: #FFFFFF; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }
        .green { background: #278540; flex: 1; }
        
        .sun-center {
            width: 10px;
            height: 10px;
            background: #FFD500;
            border-radius: 50%;
            position: absolute;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 { color: white; margin-bottom: 25px; font-size: 24px; }

        .social-link {
            display: block;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:active {
            background: white;
            color: #333;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="kurdish-flag-fixed">
        <div class="red"></div>
        <div class="white"><div class="sun-center"></div></div>
        <div class="green"></div>
    </div>

    <div class="card">
        <img src="IMG_0210.jpeg">
        <h2>پەیجەکانم</h2>
        
        <a href="https://snapchat.com/t/2vv21LTj" target="_blank" class="social-link">Snapchat</a>
        
        <a href="https://www.tiktok.com/@yusf_kirkuky0?_r=1&_t=ZS-9638cTi4ym4" target="_blank" class="social-link">TikTok</a>
        
        <a href="https://www.instagram.com/uxyusa0?igsh=MXA0OXA4MnZwNnZ6Zg%3D%3D&utm_source=qr" target="_blank" class="social-link">Instagram</a>
    </div>

</body>
</html>
