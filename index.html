<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەیجەکانی یوسف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-flag {
            width: 120px;
            height: 80px;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 2px solid white;
        }

        .red { background-color: #ED2024; flex: 1; }
        .white { 
            background-color: #FFFFFF; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .green { background-color: #278540; flex: 1; }
        .sun { color: #FFD100; font-size: 24px; font-weight: bold; }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2 { color: white; margin-bottom: 25px; font-size: 24px; }

        .social-link {
            display: block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:active {
            background: white;
            color: #333;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="main-flag">
            <div class="red"></div>
            <div class="white"><div class="sun">☀️</div></div>
            <div class="green"></div>
        </div>

        <h2>پەیجەکانم</h2>

        <a href="https://snapchat.com/t/2vv21LTj" class="social-link">Snapchat</a>
        <a href="https://www.tiktok.com/@yusf_kirkuki" class="social-link">TikTok</a>
        <a href="https://www.instagram.com/uxyusa0" class="social-link">Instagram</a>
    </div>

</body>
</html>
