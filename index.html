<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="name" content="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەیجەکانی یوسف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: sans-serif;
            position: relative;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .kurdish-flag-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            z-index: 1000;
        }

        .red { background-color: #ED2024; flex: 1; }
        .white { 
            background-color: #FFFFFF; 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .green { background-color: #278540; flex: 1; }
        .sun-center {
            color: #FFD100;
            font-size: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 { color: white; margin-bottom: 25px; }

        .social-link {
            display: block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:active {
            background: white;
            color: #333;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="kurdish-flag-fixed">
        <div class="red"></div>
        <div class="white"><div class="sun-center">☀️</div></div>
        <div class="green"></div>
    </div>

    <div class="card">
        <img src="IMG_0210.jpeg" class="profile-img">
        <h2>پەیجەکانم</h2>

        <a href="https://snapchat.com/t/2vv21LTj" class="social-link">Snapchat</a>
        <a href="https://www.tiktok.com/@yusf_kirkuki" class="social-link">TikTok</a>
        <a href="https://www.instagram.com/uxyusa0" class="social-link">Instagram</a>
    </div>

</body>
</html>
